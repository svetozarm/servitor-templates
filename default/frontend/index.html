<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
h1 { margin-bottom: 1rem; }
form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
input[type="text"] { flex: 1; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #fff; }
ul { list-style: none; }
li { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
li.done span { text-decoration: line-through; opacity: 0.5; }
li span { flex: 1; }
li button { background: transparent; color: #c00; font-size: 0.8rem; padding: 0.25rem 0.5rem; }
</style>
</head>
<body>
<h1>Todos</h1>
<form id="form">
  <input type="text" id="input" placeholder="What needs to be done?" required aria-label="New todo text">
  <button type="submit">Add</button>
</form>
<ul id="list" aria-label="Todo list"></ul>
<script>
const list = document.getElementById('list');
const form = document.getElementById('form');
const input = document.getElementById('input');

async function load() {
  const res = await fetch('api/todos');
  const todos = await res.json();
  list.innerHTML = '';
  todos.forEach(t => {
    const li = document.createElement('li');
    if (t.done) li.className = 'done';
    li.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} aria-label="Toggle ${esc(t.text)}">
      <span>${esc(t.text)}</span><button aria-label="Delete ${esc(t.text)}">✕</button>`;
    li.querySelector('input').onchange = () => toggle(t);
    li.querySelector('button').onclick = () => remove(t.id);
    list.appendChild(li);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

form.onsubmit = async (e) => {
  e.preventDefault();
  await fetch('api/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text: input.value}) });
  input.value = '';
  load();
};

async function toggle(t) {
  await fetch('api/todos/' + t.id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text: t.text, done: !t.done}) });
  load();
}

async function remove(id) {
  await fetch('api/todos/' + id, { method: 'DELETE' });
  load();
}

load();
</script>
</body>
</html>
